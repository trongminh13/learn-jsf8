<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="bai1.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="card">
        <div class="card__heart">
            <a class="item" href=""><i class="fa-regular fa-heart"></i></a>
        </div>
        <div class="card__cart">
            <a class="item" href=""><i class="fa-solid fa-cart-shopping"></i></a>
        </div>
        <div class="card__img">
            <img class="head1" src="/image/FiHZHUEGbCRdFJyqUCVEstAEEYXuOtyP.webp" alt="hehe">
        </div>
        <div class="card__title">
            Nike Zoom KD 12
        </div>
        <div class="card__price">
$99
        </div>
        <div class="card__size">
            <h1>Size</h1>
            <span>6</span>
            <span>7</span>
            <span>8</span>
            <span>9</span>
        </div>
        <div class="card__color">
            <h3>Color:</h3>
            <span class="card__color--green"></span>
            <span class="card__color--red"></span>
            <span class="card__color--black"></span>
        </div>
        <div class="card__action">
            <button>Buy Now</button>
            <button>Add Cart</button>
        </div>
    </div>

</body>

</html>
